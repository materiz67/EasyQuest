# Prefix przed każdą wiadomością pluginu
prefix: "<dark_gray>[<gradient:gold:yellow>EasyQuests</gradient>]<gray> "

# -------------------------------------------------- #
#  OGÓLNE                                             #
# -------------------------------------------------- #
no-permission: "<red>Nie masz uprawnień do użycia tej komendy."
player-only: "<red>Ta komenda może być wykonana tylko przez gracza."
player-offline: "<red>Gracz <yellow>{player}</yellow> jest offline."
invalid-usage: "<red>Nieprawidłowe użycie. Wpisz <yellow>/quest help</yellow>."

# -------------------------------------------------- #
#  POSTĘP ZADAŃ                                       #
# -------------------------------------------------- #
quest-started: "<green>✔ Rozpocząłeś nowe zadanie: <yellow>{quest}</yellow>!"
quest-completed: "<gold>★ Gratulacje! Ukończyłeś zadanie <green>{quest}</green>!"
quest-progress: "<gray>Postęp: <yellow>{objective}</yellow> (<gold>{progress}/{target}</gold>)"
quest-locked: "<red>✖ To zadanie jest zablokowane. Ukończ najpierw poprzednie!"
quest-all-completed: "<green>✔ Ukończyłeś już wszystkie zadania w tej kategorii!"
already-started: "<yellow>⚠ To zadanie jest już aktywne."

# -------------------------------------------------- #
#  KOMENDA /QUEST                                     #
# -------------------------------------------------- #
# Nagłówek /quest status
status-header: "<dark_gray>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
status-title: "<gradient:gold:yellow>  Twoje Aktywne Zadania</gradient>"
status-line: " <gray>▸ <yellow>{quest} <dark_gray>| <gold>{category} <gray>➔ <aqua>{progress}<gray>/<aqua>{target}"
status-no-active: " <gray>Nie masz żadnych aktywnych zadań."
status-footer: "<dark_gray>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

# Pomoc /quest
help-header: "<dark_gray>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
