  # Czy pokazywaДҮ ActionBar podczas postДҷpu?
  show-actionbar: true
  # Czy automatycznie aktywowaДҮ pierwsze zadanie kategorii przy wejЕӣciu gracza?
  auto-start-first-quest: true

