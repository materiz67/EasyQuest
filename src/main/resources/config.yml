# --- Główne ustawienia GUI ---
gui:
  # Tytuł głównego menu zadań (obsługuje kolory Hex)
  title: "&#ff9900&lZadania &#ffcc00Survival&#ff9900+&#ffff00Działki"

  # Rozmiar ekwipunku GUI (musi być wielokrotnością liczby 9)
  size: 27

  # Wypełnianie pustych slotów dekoracyjnymi szybami
  fill-empty-slots: true
  filler-material: "GRAY_STAINED_GLASS_PANE"
  filler-name: " "

  # --- Konfiguracja Wyglądu Paska Postępu ---
  progress-bar:
    char: "■" # Znak paska postępu w GUI (np: ■, |, █)
    color-completed: "&#55ff55" # Kolor części ukończonej (Hex)
    color-uncompleted: "&#ff5555" # Kolor części nieukończonej (Hex)

  # --- Konfiguracja Efektów Dźwiękowych GUI ---
  sounds:
    enabled: true
    # Dźwięki muszą pasować do nazewnictwa wersji Twojego silnika (np. 1.16 - 1.21+)
    open-menu: "BLOCK_CHEST_OPEN"       # Otwarcie głównego menu
    click-category: "UI_BUTTON_CLICK"   # Kliknięcie w kategorię
    click-back: "BLOCK_FIRE_EXTINGUISH" # Powrót do menu głównego
    quest-locked: "ENTITY_VILLAGER_NO"  # Kliknięcie zablokowanego zadania
    quest-unlocked: "BLOCK_NOTE_BLOCK_PLING" # Kliknięcie dostępnego/zrobionego zadania

  # --- Mapowanie kategorii do slotów i ich wygląd ---
  categories:
    mining:
      slot: 11
      material: DIAMOND_PICKAXE
      name: "&#e0a91f&lGórnictwo"
      lore:
        - "&#777777Rozwijaj swoje rzemiosło głęboko pod ziemią."
        - ""
        - "&#55ff55Kliknij, aby sprawdzić zadania!"
    building:
      slot: 12
      material: BRICKS
      name: "&#a6ff33&lBudownictwo"
      lore:
        - "&#777777Pokaż swój kunszt budowlany."
        - ""
        - "&#55ff55Kliknij, aby sprawdzić zadania!"
    farming:
      slot: 13
      material: WHEAT
      name: "&#ffaa00&lRolnictwo"
      lore:
        - "&#777777Uprawiaj rośliny i zbieraj plony."
        - ""
        - "&#55ff55Kliknij, aby sprawdzić zadania!"
    combat:
      slot: 14
      material: IRON_SWORD
      name: "&#ff3333&lWalka"
      lore:
        - "&#777777Chroń miasto i działki przed potworami."
        - ""
        - "&#55ff55Kliknij, aby sprawdzić zadania!"
    fishing:
      slot: 15
      material: FISHING_ROD
      name: "&#33ccff&lRybactwo"
      lore:
        - "&#777777Zrelaksuj się na molo i złów rzadkie okazy."
        - ""
        - "&#55ff55Kliknij, aby sprawdzić zadania!"