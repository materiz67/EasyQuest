database:
  # true = MySQL/MariaDB (sieДҮ serwerГіw), false = SQLite (lokalny plik database.db)
  use-mysql: false
  host: "localhost"
  port: 3306
  database: "minecraft"
  username: "root"
  password: "password"

# -------------------------------------------------- #
#  OGГ“LNE USTAWIENIA                                  #
# -------------------------------------------------- #
settings:
  # Format paska postДҷpu wyЕӣwietlanego nad ekwipunkiem gracza (ActionBar)
