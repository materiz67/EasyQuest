      - "<gray>Uzyj swojej wedki i zlow 8 sztuk łososia,"
      - "<gray>ktory bedzie zdrowym i sytym posilkiem."
    material: "SALMON"
    objective:
      type: "FISH_ITEM"
      target: "SALMON"
      amount: 8
    rewards:
      - "give %player% cooked_salmon 8"
