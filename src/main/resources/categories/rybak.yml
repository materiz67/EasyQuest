      - "<gray>Zlow 5 sztuk rozdymek, ktore"
      - "<gray>mozna wykorzystac do uwarzenia mikstur oddychania pod woda."
    material: "PUFFERFISH"
    objective:
      type: "FISH_ITEM"
      target: "PUFFERFISH"
