      - "<gray>pozyskiwanie surowcow najwyzszej klasy."
    material: "DIAMOND_PICKAXE"
    objective:
      type: "CRAFT_ITEM"
      target: "DIAMOND_PICKAXE"
      amount: 1
    rewards:
      - "xp give %player% 200"
  - id: "kowal-kowadlo"
    display-name: "<dark_gray>Kowalskie Serce"
    description:
