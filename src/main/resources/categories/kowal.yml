      - "<gray>Wytworz jedna drewniano-zelazna tarcze (shield),"
      - "<gray>aby poczuc sie pewniej w ciemnych jaskiniach."
    material: "SHIELD"
    objective:
      type: "CRAFT_ITEM"
      target: "SHIELD"
      amount: 1
    rewards:
