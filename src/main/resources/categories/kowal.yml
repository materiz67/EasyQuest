      - "<gray>Zgromadz zelazne bloki i wytworz kowadlo (anvil),"
      - "<gray>ktore umozliwi Ci laczenie zaklec na przedmiotach."
    material: "ANVIL"
    objective:
      type: "CRAFT_ITEM"
      target: "ANVIL"
      amount: 1
    rewards:
      - "give %player% gold_ingot 5"