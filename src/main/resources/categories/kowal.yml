      - "<gray>Wykuj ciezki, zelazny napiersnik (chestplate),"
      - "<gray>ktory ochroni Twoje serce przed strzałami szkieletow."
    material: "IRON_CHESTPLATE"
    objective:
      type: "CRAFT_ITEM"
      target: "IRON_CHESTPLATE"
      amount: 1
    rewards:
      - "give %player% coal 10"
  - id: "kowal-tarcza"
    display-name: "<gray>Solidna Tarcza"
    description:
